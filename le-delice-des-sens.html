<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ohmyfood - restaurant Le délice des sens</title>
    <!-- Import Normalize from CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Import Font from CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Shrikhand&display=swap"
      rel="stylesheet"
    />

    <!-- Import Icons (FontAwesome) from CDN -->
    <script
      src="https://kit.fontawesome.com/e9a865197c.js"
      crossorigin="anonymous"
    ></script>

    <!-- Import Style -->
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="restaurant">
    <!-- Begin Header -->
    <header>
      <div class="logo__header">
        <a href="index.html" class="btn btn--return"
          ><i class="fa-solid fa-arrow-left"></i
        ></a>
        <a href="index.html" class="logo__header__container">
          <img
            src="./images/logo/ohmyfood@2x.svg"
            alt="Logo du service OhmyFood"
            class="logo__header__container__img"
          />
        </a>
      </div>
    </header>
    <!-- End Header -->
    <!-- Begin Main -->
    <main>
      <!-- Begin Hero section -->
      <section class="hero hero--img">
        <div class="hero__img__container">
          <img
            src="./images/restaurants/louis-hansel-shotsoflouis-qNBGVyOCY8Q-unsplash.jpg"
            alt="Photographie du restaurant Le délice des sens"
            class="header__logo"
          />
        </div>
        <div class="hero__content">
          <h1 class="hero__title">Le délice des sens</h1>
          <button class="btn btn--heart">
            <i class="fa-solid fa-heart icon__heart icon__heart--overlay"></i>
            <i class="fa-regular fa-heart icon__heart icon__heart--base"></i>
          </button>
        </div>
      </section>
      <!-- End Hero section -->

      <!-- Begin restaurant-menu section -->
      <div class="restaurant-menu">
        <!-- Begin restaurant-menu appetizers -->
        <section class="appetizers__section">
          <h2 class="appetizers__section__title">Entrées</h2>

          <ul class="list list--appetizers">
            <li class="list-item">
              <label for="appetizers1">
                <input type="checkbox" id="appetizers1" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title"
                      >Tartare de thon</span
                    >
                    <span class="list-item__content__ingredients"
                      >Assaisonné au yuzu</span
                    >
                  </span>
                  <span class="list-item__price">25€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>

            <li class="list-item">
              <label for="appetizers2">
                <input type="checkbox" id="appetizers2" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title">
                      Bouchée de homard croustillant
                    </span>
                    <span class="list-item__content__ingredients">
                      Et sa farandole de petits légumes
                    </span>
                  </span>
                  <span class="list-item__price">35€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>

            <li class="list-item">
              <label for="appetizers3">
                <input type="checkbox" id="appetizers3" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title"
                      >Velouté de cèpes</span
                    >
                    <span class="list-item__content__ingredients"
                      >Aux truffes</span
                    >
                  </span>
                  <span class="list-item__price">20€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>
          </ul>
        </section>
        <!-- End restaurant-menu appetizers -->
        <!-- Begin restaurant-menu main-course -->
        <section class="main-course__section">
          <h2 class="main-course__section__title">Plats</h2>

          <ul class="list list--main-course">
            <li class="list-item">
              <label for="maincourse1">
                <input type="checkbox" id="maincourse1" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title">
                      Poulet rôti aux herbes de Provence
                    </span>
                    <span class="list-item__content__ingredients"
                      >Et sa crème de truffe</span
                    >
                  </span>
                  <span class="list-item__price">40€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>

            <li class="list-item">
              <label for="maincourse2">
                <input type="checkbox" id="maincourse2" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title"
                      >Langouste rôtie</span
                    >
                    <span class="list-item__content__ingredients"
                      >Et ses légumes de saison</span
                    >
                  </span>
                  <span class="list-item__price">35€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>

            <li class="list-item">
              <label for="maincourse3">
                <input type="checkbox" id="maincourse3" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title"
                      >Côte de boeuf Angus</span
                    >
                    <span class="list-item__content__ingredients"
                      >Et sa purée de panais</span
                    >
                  </span>
                  <span class="list-item__price">44€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>
          </ul>
        </section>
        <!-- End restaurant-menu main-course -->
        <!-- Begin restaurant-menu desserts -->
        <section class="desserts__section">
          <h2 class="desserts__section__title">Desserts</h2>

          <ul class="list list--desserts">
            <li class="list-item">
              <label for="desserts1">
                <input type="checkbox" id="desserts1" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title"
                      >Farandole de desserts</span
                    >
                    <span class="list-item__content__ingredients">Du chef</span>
                  </span>
                  <span class="list-item__price">18€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>

            <li class="list-item">
              <label for="desserts2">
                <input type="checkbox" id="desserts2" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title">Crème brulée</span>
                    <span class="list-item__content__ingredients"
                      >Revisitée</span
                    >
                  </span>
                  <span class="list-item__price">22€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>

            <li class="list-item">
              <label for="desserts3">
                <input type="checkbox" id="desserts3" />
                <span class="list-item__body">
                  <span class="list-item__content">
                    <span class="list-item__content__title">Tiramisu</span>
                    <span class="list-item__content__ingredients"
                      >À la noisette</span
                    >
                  </span>
                  <span class="list-item__price">23€</span>
                </span>
                <span class="list-item__check">
                  <i class="fa-solid fa-circle-check"></i>
                </span>
              </label>
            </li>
          </ul>
        </section>
        <!-- End restaurant-menu desserts -->
      </div>
      <!-- End restaurant-menu section -->

      <!-- Begin Order section -->
      <div class="order-button__container">
        <button class="btn btn--gradient btn--order">Commander</button>
      </div>
      <!-- End Order section -->
    </main>
    <!-- End Main -->

    <!-- Begin Footer -->
    <footer>
      <div class="logo__footer">
        <a href="index.html">
          <img
            src="./images/logo/ohmyfood@2x.svg"
            alt=""
            class="logo__footer__img"
          />
        </a>
      </div>
      <ul class="footer__menu">
        <li>
          <i class="fa-solid fa-utensils"></i>
          <a href="" class="menu__link">Proposer un restaurant</a>
        </li>
        <li>
          <i class="fa-solid fa-handshake-angle"></i>
          <a href="" class="menu__link">Devenir partenaire</a>
        </li>
        <li>
          <a href="" class="menu__link">Mentions légales</a>
        </li>
        <li>
          <a href="mailto:contact@ohmyfood.com" class="menu__link">Contact</a>
        </li>
      </ul>
    </footer>
    <!-- End Footer -->
  </body>
</html>
